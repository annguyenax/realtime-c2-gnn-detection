# configs/model_gat.yaml
# GATv2 Model Configuration

model:
  name: "gatv2_c2_detector"
  version: "1.0.0"
  type: "GATv2C2Detector"

  architecture:
    in_channels: 14          # Same 14-dim node features as GraphSAGE
    hidden_channels: 32      # Per-head hidden dim
    out_channels: 2          # binary classification
    heads: 8                 # Multi-head attention
    dropout: 0.3
    edge_dim: 4              # Optional edge features: [flow_count, total_bytes, avg_duration, protocol]
    concat: true             # Concatenate heads (vs mean)
    residual: true           # Residual connections
    share_weights: false     # GATv2 — separate weight matrices

  training:
    optimizer: "adam"
    learning_rate: 0.0005    # Slightly lower than SAGE for stability
    weight_decay: 5.0e-4

    lr_scheduler:
      type: "reduce_on_plateau"
      factor: 0.5
      patience: 10
      min_lr: 1.0e-6
      monitor: "val_f1"

    max_epochs: 200
    batch_size: 512
    num_workers: 4

    # NeighborLoader — fewer neighbors than SAGE (attention is heavier)
    num_neighbors: [15, 8, 5]

    class_weights: "auto"

    early_stopping:
      enabled: true
      patience: 25
      min_delta: 0.001
      monitor: "val_f1"
      mode: "max"

    seed: 42
    deterministic: true

  split:
    method: "time_based"
    train_ratio: 0.70
    val_ratio: 0.10
    test_ratio: 0.20

  inference:
    threshold: 0.70
    batch_size: 256
    device: "auto"
    # Store attention weights during inference for explainability
    store_attention_weights: true

  # Explainability — attention-based
  explainability:
    enabled: true
    top_k_neighbors: 5      # Visualize top-5 influential neighbors per alert
    output_dir: "reports/figures/attention"

  mlflow:
    experiment_name: "c2gnn_gatv2"
    run_tags:
      model_type: "gatv2"
      dataset: "CTU-13"
    log_model: true
    register_model: true
    model_name: "c2-gatv2"

  artifacts:
    model_dir: "models/gat"
    checkpoint_filename: "gatv2_best.pt"
    results_filename: "gatv2_results.json"
