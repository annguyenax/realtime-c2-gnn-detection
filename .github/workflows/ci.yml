name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Job 1: Lint only (fast, no heavy deps) ────────────────────────────────
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install --quiet "ruff>=0.4.7"

      - name: Lint with ruff
        run: python -m ruff check src tests

      - name: Format check
        run: python -m ruff format --check src tests

  # ── Job 2: Tests with CPU-only torch ──────────────────────────────────────
  test:
    name: Tests (CPU torch)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install --quiet \
            polars numpy networkx structlog \
            pytest pytest-cov pytest-asyncio

      - name: Install project (no deps)
        run: pip install -e . --no-deps --quiet

      - name: Run tests
        run: |
          python -m pytest tests/ \
            --cov=src/c2gnn \
            --cov-report=xml \
            --cov-report=term-missing \
            -v

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
